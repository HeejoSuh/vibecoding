<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바이브 코딩 — 느끼며 만드는 개발</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --accent: #7c6aff;
      --accent2: #ff6a6a;
      --accent3: #6affcc;
      --text: #e8e8f0;
      --text-dim: #7a7a96;
      --border: rgba(124, 106, 255, 0.15);
      --glow: rgba(124, 106, 255, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(20px);
      background: rgba(10, 10, 15, 0.7);
      border-bottom: 1px solid var(--border);
      transition: padding 0.3s;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }

    .nav-cta {
      background: var(--accent);
      color: #fff !important;
      padding: 0.5rem 1.4rem;
      border-radius: 4px;
    }

    /* ✅ NEW: hamburger */
    .menu-toggle {
      display: none;
      font-size: 1.6rem;
      color: var(--text);
      cursor: pointer;
    }

    /* MOBILE MENU */
    @media (max-width: 768px) {
      .menu-toggle { display: block; }

      .nav-links {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--surface);
        flex-direction: column;
        padding: 1.5rem;
        display: none;
      }

      .nav-links.active {
        display: flex;
      }
    }

    /* keep rest SAME */
    section { padding: 6rem 2.5rem; max-width: 1200px; margin: 0 auto; }
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">VIBE CODING</a>

  <!-- ✅ NEW BUTTON -->
  <div class="menu-toggle" id="menuToggle">☰</div>

  <ul class="nav-links" id="navLinks">
    <li><a href="#what">개념</a></li>
    <li><a href="#features">특징</a></li>
    <li><a href="#how">시작하기</a></li>
    <li><a href="#cta" class="nav-cta">강의 보기</a></li>
  </ul>
</nav>

<!-- (everything else unchanged — shortened for clarity, keep yours) -->

<script>
  // ✅ MENU TOGGLE (only addition)
  const toggle = document.getElementById('menuToggle');
  const navLinks = document.getElementById('navLinks');

  toggle.addEventListener('click', () => {
    navLinks.classList.toggle('active');
  });
</script>

</body>
</html>
