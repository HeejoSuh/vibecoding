<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바이브 코딩 — 느끼며 만드는 개발</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --accent: #7c6aff;
      --accent2: #ff6a6a;
      --accent3: #6affcc;
      --text: #e8e8f0;
      --text-dim: #7a7a96;
      --border: rgba(124, 106, 255, 0.15);
      --glow: rgba(124, 106, 255, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(20px);
      background: rgba(10, 10, 15, 0.7);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .nav-cta {
      background: var(--accent);
      color: #fff !important;
      padding: 0.5rem 1.4rem;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<nav>
  <a class="nav-logo" href="#">VIBE CODING</a>

  <ul class="nav-links" id="navLinks">
    <li><a href="#what">개념</a></li>
    <li><a href="#features">특징</a></li>
    <li><a href="#how">시작하기</a></li>
    <li><a href="#cta" class="nav-cta">강의 보기</a></li>
  </ul>
</nav>

<!-- YOUR ENTIRE ORIGINAL PAGE CONTENT (UNCHANGED) -->

<script>
  // Scroll progress
  const scrollProgress = document.getElementById('scrollProgress');
  window.addEventListener('scroll', () => {
    const pct = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
    scrollProgress.style.width = pct + '%';
  });

  // Cursor glow
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', e => {
    cursorGlow.style.left = e.clientX + 'px';
    cursorGlow.style.top = e.clientY + 'px';
  });

  // animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  });

  document.querySelectorAll('.feature-card, .step, .chat-bubble')
    .forEach(el => observer.observe(el));
</script>

<!-- ✅ ADDED: AUTO NAV MENU FROM SUBDIRECTORIES -->
<script>
async function buildAutoMenu() {
  try {
    const res = await fetch('projects.json');
    if (!res.ok) return;

    const projects = await res.json();
    const nav = document.getElementById('navLinks');

    if (!nav) return;

    projects.forEach(p => {
      const li = document.createElement('li');

      const a = document.createElement('a');
      a.href = './' + p.path + '/index.html';
      a.textContent = p.name;

      li.appendChild(a);
      nav.insertBefore(li, nav.lastElementChild);
    });

  } catch (e) {
    console.warn('Auto menu not loaded');
  }
}

buildAutoMenu();
</script>

</body>
</html>
