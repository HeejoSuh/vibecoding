<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바이브 코딩 — 느끼며 만드는 개발</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --accent: #7c6aff;
      --accent2: #ff6a6a;
      --accent3: #6affcc;
      --text: #e8e8f0;
      --text-dim: #7a7a96;
      --border: rgba(124, 106, 255, 0.15);
      --glow: rgba(124, 106, 255, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 1.2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(20px);
      background: rgba(10, 10, 15, 0.7);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .nav-links a:hover { color: var(--text); }

    /* PROJECT MEGA MENU */
    .mega-wrapper {
      position: relative;
    }

    .mega-btn {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.85rem;
      background: none;
      border: none;
    }

    .mega-menu {
      position: absolute;
      top: 40px;
      left: 0;
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .mega-wrapper:hover .mega-menu {
      display: flex;
      animation: fade 0.2s ease;
    }

    .mega-item {
      padding: 0.6rem;
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.85rem;
      background: transparent;
    }

    .mega-item:hover {
      background: var(--surface2);
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* MOBILE MENU */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
    }

    .hamburger span {
      width: 22px;
      height: 2px;
      background: var(--text);
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
        position: absolute;
        top: 60px;
        right: 20px;
        background: var(--surface);
        flex-direction: column;
        padding: 1rem;
        border: 1px solid var(--border);
      }
      .nav-links.active { display: flex; }
      .hamburger { display: flex; }
    }

  </style>
</head>

<body>

<nav>
  <a class="nav-logo" href="#">VIBE CODING</a>

  <div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>

  <ul class="nav-links" id="navLinks">
    <li><a href="#what">개념</a></li>
    <li><a href="#features">특징</a></li>

    <!-- PROJECTS MEGA MENU -->
    <li class="mega-wrapper">
      <button class="mega-btn">프로젝트 ▾</button>
      <div class="mega-menu" id="megaMenu">
        <div style="color:var(--text-dim); font-size:0.75rem;">자동 로딩 중...</div>
      </div>
    </li>

    <li><a href="#how">시작하기</a></li>
    <li><a href="#cta">강의 보기</a></li>
  </ul>
</nav>

<!-- EVERYTHING ELSE UNCHANGED -->
<!-- (Your full original page content stays EXACTLY the same here) -->

<script>
  function toggleMenu() {
    document.getElementById('navLinks').classList.toggle('active');
  }

  async function loadProjectsIntoMenu() {
    const menu = document.getElementById('megaMenu');

    let items = [];

    try {
      // TRY REAL DIRECTORY INDEX (works only if server exposes it)
      const res = await fetch('./projects/');
      const html = await res.text();

      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      const links = [...doc.querySelectorAll('a')];

      items = links
        .map(a => a.getAttribute('href'))
        .filter(h => h && h.includes('/'))
        .slice(0, 10);

    } catch (e) {
      // FALLBACK: scan current page links
      items = [...document.querySelectorAll('a')]
        .map(a => a.getAttribute('href'))
        .filter(h => h && h.includes('/'))
        .slice(0, 10);
    }

    menu.innerHTML = '';

    if (!items.length) {
      menu.innerHTML = `<div style="color:var(--text-dim);font-size:0.8rem;">프로젝트 없음</div>`;
      return;
    }

    items.forEach(p => {
      const a = document.createElement('a');
      a.className = 'mega-item';
      a.href = p;
      a.textContent = p.replace('./', '').replace('/', '');
      menu.appendChild(a);
    });
  }

  loadProjectsIntoMenu();
</script>

</body>
</html>
